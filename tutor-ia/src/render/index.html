<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tutor IA</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: #eee; margin: 0; }
    button { padding: 16px 32px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; }
    #status { margin-top: 20px; font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <button id="talkBtn">🎤 Hablar (temporal, se quita en Fase 3 con Porcupine)</button>
  <p id="status">Esperando...</p>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'es-MX';
    recognition.interimResults = false;

    const statusEl = document.getElementById('status');
    const btn = document.getElementById('talkBtn');

    btn.addEventListener('click', () => {
      statusEl.textContent = 'Escuchando...';
      recognition.start();
    });

    recognition.addEventListener('result', (event) => {
      const transcript = event.results[0][0].transcript;
      statusEl.textContent = `Escuché: "${transcript}"`;
      responderHardcodeado(transcript);
    });

    recognition.addEventListener('error', (event) => {
      statusEl.textContent = `Error: ${event.error}`;
    });

    function responderHardcodeado(transcript) {
      const respuesta = `Escuché que dijiste: ${transcript}. Pronto seré más inteligente.`;
      const utterance = new SpeechSynthesisUtterance(respuesta);
      utterance.lang = 'es-MX';
      utterance.onstart = () => { statusEl.textContent = 'Hablando...'; };
      utterance.onend = () => { statusEl.textContent = 'Esperando...'; };
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
