<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tutor IA - Hackatón</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: row; height: 100vh; background: #121212; color: #fff; margin: 0; padding: 20px; box-sizing: border-box; gap: 20px; }
    #panel-izquierdo { width: 30%; display: flex; flex-direction: column; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    #panel-derecho { width: 70%; display: flex; flex-direction: column; background: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    canvas { background: #1a1a1a; border: 2px solid #333; border-radius: 8px; width: 100%; flex-grow: 1; margin-top: 10px; }
    
    .input-group { display: flex; gap: 10px; margin-top: auto; }
    input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2d2d2d; color: white; font-size: 16px; }
    button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4338ca; }
    button:disabled { background: #333; cursor: not-allowed; }
    
    #avatar-box { font-size: 80px; text-align: center; margin: 30px 0; background: #252529; padding: 40px 20px; border-radius: 12px; border: 1px solid #333; }
    #status { font-size: 18px; line-height: 1.5; opacity: 0.9; min-height: 80px; }
  </style>
</head>
<body>

  <div id="panel-izquierdo">
    <div>
      <h3 style="margin-top: 0; color: #a5b4fc;">🐸 Tutor Socrático</h3>
      <div id="avatar-box">😐</div>
      <p id="status">Iniciando sistema...</p>
    </div>
    
    <div class="input-group">
      <input type="text" id="promptInput" placeholder="Ej: Explícame el teorema de Pitágoras..." />
      <button id="talkBtn">Enviar</button>
    </div>
  </div>

  <div id="panel-derecho">
    <h3 style="margin-top: 0; color: #a5b4fc;">📋 Pizarra Activa</h3>
    <canvas id="pizarraCanvas" width="700" height="500"></canvas>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const avatarBox = document.getElementById('avatar-box');
    const promptInput = document.getElementById('promptInput');
    const talkBtn = document.getElementById('talkBtn');
    
    const canvas = document.getElementById('pizarraCanvas');
    const ctx = canvas.getContext('2d');

    const emojisAvatar = { reposo: "😐", hablando: "🐸", pensando: "🤔", confundido: "🧐" };

    // 1. INICIALIZACIÓN (Manejo del Checkpoint 1)
    window.onload = async () => {
      const inicial = await window.electronAPI.inicializarTutor();
      if (inicial.success) {
        procesarContratoInterfaz(inicial.data);
      } else {
        statusEl.textContent = "Error al iniciar: " + inicial.error;
      }
    };

    // 2. ENVÍO DE MENSAJE (Manejo del Checkpoint 2)
    talkBtn.addEventListener('click', async () => {
      const texto = promptInput.value.trim();
      if (!texto) return;

      // Estado de carga
      promptInput.value = "";
      talkBtn.disabled = true;
      statusEl.textContent = "Analizando y pensando la mejor forma de explicarlo...";
      avatarBox.textContent = emojisAvatar.pensando;

      // Llamada al orquestador (IPC)
      const respuesta = await window.electronAPI.enviarMensajeAlAgente(texto);
      
      talkBtn.disabled = false;

      if (respuesta.success) {
        procesarContratoInterfaz(respuesta.data);
      } else {
        statusEl.textContent = "Hubo un error de conexión con la IA.";
        avatarBox.textContent = emojisAvatar.confundido;
        console.error(respuesta.error);
      }
    });

    // Permitir enviar con la tecla Enter
    promptInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') talkBtn.click();
    });

    // 3. PROCESAMIENTO DEL CONTRATO JSON (Motor de Render)
    function procesarContratoInterfaz(data) {
      console.log("Contrato recibido:", data);

      // Actualizar emoción inicial
      if (data.avatar_estado) {
        avatarBox.textContent = emojisAvatar[data.avatar_estado] || emojisAvatar.reposo;
      }

      // Motor de dibujo en el Canvas
      if (data.pasos_dibujo && Array.isArray(data.pasos_dibujo)) {
        data.pasos_dibujo.forEach(paso => {
          ctx.strokeStyle = paso.color || "#4f46e5";
          ctx.fillStyle = paso.color || "#4f46e5";
          ctx.lineWidth = 4;

          switch (paso.comando) {
            case "limpiar":
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              break;
            case "linea":
              if (paso.x == null || paso.y == null || paso.x2 == null || paso.y2 == null) break;
              ctx.beginPath();
              ctx.moveTo(paso.x, paso.y);
              ctx.lineTo(paso.x2, paso.y2);
              ctx.stroke();
              break;
            case "rectangulo":
              if (paso.x == null || paso.y == null || paso.w == null || paso.h == null) break;
              ctx.strokeRect(paso.x, paso.y, paso.w, paso.h);
              break;
            case "circulo":
              if (paso.x == null || paso.y == null || paso.radio == null) break;
              ctx.beginPath();
              ctx.arc(paso.x, paso.y, paso.radio, 0, 2 * Math.PI);
              ctx.stroke();
              break;
            case "texto":
              if (paso.x == null || paso.y == null || !paso.contenido) break;
              ctx.font = "bold 24px 'Segoe UI', sans-serif";
              ctx.fillText(paso.contenido, paso.x, paso.y);
              break;
          }
        });
      }

      // Síntesis de voz (TTS Nativo)
      if (data.texto_a_hablar) {
        statusEl.textContent = data.texto_a_hablar;
        
        // Cancelamos cualquier audio previo que se haya quedado atorado
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(data.texto_a_hablar);
        utterance.lang = 'es-MX';
        utterance.rate = 1.05; // Un toque más dinámico
        
        // Sincronización visual del Avatar con la voz
        utterance.onstart = () => { avatarBox.textContent = emojisAvatar.hablando; };
        utterance.onend = () => { avatarBox.textContent = emojisAvatar.reposo; };
        utterance.onerror = () => { avatarBox.textContent = emojisAvatar.reposo; };
        
        window.speechSynthesis.speak(utterance);
      }
    }
  </script>
</body>
</html>
